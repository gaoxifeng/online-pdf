<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>online-pdf · 100% in your browser</title>
<meta name="description" content="Read, merge, split, OCR & sign PDFs — 100% in your browser. Your file never leaves your device.">
<meta name="theme-color" content="#2f6fed">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="online-pdf">
<style>
  :root { --bg:#f6f7f9; --panel:#fff; --line:#e3e6ea; --ink:#1f2329; --mut:#697077;
          --pri:#2f6fed; --pri2:#1b54c8; --ok:#1a7f48; --bad:#c0392b; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         color:var(--ink); background:var(--bg); }
  header { display:flex; align-items:center; gap:12px; padding:11px 16px; background:var(--panel);
           border-bottom:1px solid var(--line); flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:700; }
  header .tag { font-size:12px; color:var(--ok); background:#e3f5ea; padding:2px 9px; border-radius:20px; }
  header .grow { flex:1; }
  header a { font-size:12px; color:var(--mut); text-decoration:none; }
  .wrap { display:grid; grid-template-columns:200px 1fr; gap:0; min-height:calc(100vh - 50px); }
  .wrap.collapsed { grid-template-columns:1fr; }
  .wrap.collapsed .side { display:none; }
  header button.tgl { border:1px solid var(--line); background:#fff; border-radius:6px; padding:4px 10px;
          cursor:pointer; font-size:15px; line-height:1; color:#33383d; }
  header button.tgl:hover { background:#eef1f6; }
  .side { border-right:1px solid var(--line); background:var(--panel); padding:8px; }
  .tool { padding:8px 11px; border-radius:7px; cursor:pointer; font-size:13.5px; color:#33383d; }
  .tool:hover { background:#eef1f6; }
  .tool.sel { background:var(--pri); color:#fff; }
  .main { padding:16px; max-width:960px; }
  h2 { font-size:16px; margin:0 0 2px; }
  .desc { color:var(--mut); font-size:13px; margin-bottom:12px; }
  .drop { border:2px dashed var(--line); border-radius:10px; padding:24px; text-align:center;
          color:var(--mut); background:var(--panel); cursor:pointer; transition:.15s; }
  .drop.over { border-color:var(--pri); background:#eef3ff; color:var(--pri2); }
  .drop b { color:var(--ink); }
  .drop.full { min-height:calc(100vh - 175px); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:15px; }
  .files { margin:8px 0; font-size:12px; }
  .files span { display:inline-block; background:#eef1f6; border-radius:5px; padding:2px 8px; margin:2px 4px 0 0; }
  .row { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; margin:12px 0; }
  .f { display:flex; flex-direction:column; gap:3px; }
  .f label { font-size:12px; color:var(--mut); }
  .f input[type=text], .f input[type=number], .f select { padding:7px 9px; border:1px solid var(--line);
          border-radius:7px; font:13px inherit; background:#fff; }
  .f input[type=text]{ min-width:200px; }
  .btn { background:var(--pri); color:#fff; border:0; border-radius:8px; padding:10px 20px;
         font-size:14px; font-weight:600; cursor:pointer; }
  .btn:hover { background:var(--pri2); } .btn:disabled { opacity:.55; cursor:default; }
  .btn.ghost { background:#eef1f6; color:#33383d; }
  .status { margin-top:10px; font-size:13px; color:var(--mut); min-height:18px; }
  .status.err { color:var(--bad); }
  .result { margin-top:16px; }
  .dl { display:inline-block; background:var(--ok); color:#fff; text-decoration:none; padding:8px 16px;
        border-radius:8px; font-size:14px; font-weight:600; }
  iframe { width:100%; height:62vh; border:1px solid var(--line); border-radius:8px; background:#fff; margin-top:10px; }
  pre { background:#0b1021; color:#d6e2ff; padding:12px; border-radius:8px; overflow:auto; max-height:50vh;
        white-space:pre-wrap; font:12px/1.5 ui-monospace,Consolas,monospace; }
  canvas.sig { border:1px solid var(--line); border-radius:8px; background:#fff; touch-action:none; }
  canvas.page { border:1px solid var(--line); border-radius:6px; max-width:100%; cursor:crosshair; box-shadow:0 1px 4px #0001; }
  .pill { font-size:12px; color:var(--mut); }
  .note { font-size:12px; color:var(--mut); margin-top:6px; }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .seg button { border:0; background:#fff; padding:6px 12px; cursor:pointer; font:13px inherit; }
  .seg button.on { background:var(--pri); color:#fff; }
  /* ---- PDF viewer / reader ---- */
  .viewer { position:relative; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#fff; }
  .vbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:8px 10px;
          border-bottom:1px solid var(--line); background:#fafbfc; position:sticky; top:0; z-index:5; }
  .vbar button { border:1px solid var(--line); background:#fff; border-radius:6px; padding:5px 11px;
          cursor:pointer; font:14px inherit; line-height:1; }
  .vbar button:hover { background:#eef1f6; }
  .vbar input { width:48px; padding:4px 6px; border:1px solid var(--line); border-radius:6px; font:13px inherit; text-align:center; }
  .vbar .sp { flex:1; }
  .vbar .zoom { min-width:48px; text-align:center; color:var(--mut); font-size:13px; }
  .vtabs { display:flex; gap:3px; background:#eef1f6; padding:6px 8px 0; overflow-x:auto; border-bottom:1px solid var(--line); }
  .vtab { display:flex; align-items:center; gap:6px; max-width:210px; padding:6px 10px; background:#e9edf2; border:1px solid var(--line);
          border-bottom:none; border-radius:8px 8px 0 0; font-size:12.5px; color:#33383d; cursor:pointer; }
  .vtab.active { background:#fff; font-weight:600; }
  .vtab-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:165px; }
  .vtab-x { border:0; background:transparent; color:var(--mut); cursor:pointer; font-size:11px; padding:1px 3px; border-radius:4px; line-height:1; }
  .vtab-x:hover { background:#dfe3e8; color:var(--bad); }
  .vtab-add { border:1px dashed var(--line); background:#fff; color:var(--mut); cursor:pointer; border-radius:7px 7px 0 0;
              padding:5px 12px; font-size:16px; line-height:1; align-self:flex-end; }
  .vtab-add:hover { color:var(--pri2); border-color:var(--pri); }
  .viewer.dragging::after { content:"Drop PDF here to open in a new tab"; position:absolute; inset:0; z-index:30;
              display:flex; align-items:center; justify-content:center; pointer-events:none;
              background:rgba(47,111,237,.12); border:3px dashed var(--pri); border-radius:8px; color:var(--pri2); font-size:16px; font-weight:700; }
  .vscroll { height:78vh; overflow:auto; background:#525659; padding:16px 0; }
  .vpage { position:relative; margin:0 auto 14px; background:#fff; box-shadow:0 1px 8px #0007; }
  .vpage canvas { display:block; }
  .textLayer { position:absolute; inset:0; overflow:hidden; line-height:1; }
  .textLayer span { color:transparent; position:absolute; white-space:pre; transform-origin:0 0; }
  .textLayer ::selection { background:rgba(47,111,237,.35); }
  .viewer.max { position:fixed; inset:0; z-index:9999; width:100vw; height:100vh; border:0; border-radius:0;
                display:flex; flex-direction:column; }
  .viewer.max .vstack { flex:1; min-height:0; }
  .viewer.max .vscroll { height:100%; }
  .viewer:fullscreen { display:flex; flex-direction:column; width:100vw; height:100vh; }
  .viewer:fullscreen .vstack { flex:1; min-height:0; }
  .viewer:fullscreen .vscroll { height:100%; }
  .findbar { position:absolute; top:8px; right:14px; z-index:20; display:flex; gap:6px; align-items:center;
             background:#fff; border:1px solid var(--line); border-radius:8px; padding:6px 8px; box-shadow:0 2px 12px #0003; }
  .findbar input { width:180px; padding:5px 8px; border:1px solid var(--line); border-radius:6px; font:13px inherit; }
  .findbar .cnt { font-size:12px; color:var(--mut); min-width:42px; text-align:center; }
  .findbar button { border:1px solid var(--line); background:#fff; border-radius:6px; padding:4px 9px; cursor:pointer; font:13px inherit; line-height:1; }
  .findbar button:hover { background:#eef1f6; }
  ::highlight(pdffind) { background:rgba(255,213,0,.45); }
  ::highlight(pdffindcur) { background:#ff8a3d; }
</style>
</head>
<body>
<header>
  <button class="tgl" id="sideToggle" title="Collapse / expand side panel">☰</button>
  <h1>online-pdf</h1>
  <span class="tag">100% in your browser — your file never leaves your device</span>
  <span class="grow"></span>
  <a href="https://github.com/gaoxifeng/online-pdf" target="_blank" rel="noopener">source ↗</a>
</header>
<div class="wrap">
  <div class="side" id="side"></div>
  <div class="main">
    <h2 id="title">Merge PDFs</h2>
    <div class="desc" id="desc"></div>
    <div class="drop" id="drop">Drag a PDF here, or <b>click to choose</b><div class="note" id="dropNote"></div></div>
    <input type="file" id="file" accept="application/pdf,image/*" style="display:none">
    <div class="files" id="files"></div>
    <div id="controls"></div>
    <button class="btn" id="run" disabled>Run</button>
    <div class="status" id="status"></div>
    <div class="result" id="result"></div>
  </div>
</div>

<!-- crossorigin="anonymous": jsDelivr sends Access-Control-Allow-Origin:*, so these
     load as CORS — which lets the service worker cache them at runtime for offline use. -->
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<script>
"use strict";
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
const { PDFDocument, degrees, rgb, StandardFonts } = PDFLib;

const TOOLS = [
  { id:"view", name:"View / Read", viewer:true, accept:"application/pdf",
    desc:"Read a PDF — scroll, zoom, jump to pages, select & copy text. Nothing is uploaded." },
  { id:"merge", name:"Merge", multi:true, accept:"application/pdf",
    desc:"Combine several PDFs into one." },
  { id:"split", name:"Split", desc:"Extract a page range, or split into single pages (.zip)." },
  { id:"rotate", name:"Rotate", desc:"Rotate pages by 90/180/270°." },
  { id:"watermark", name:"Watermark", desc:"Add a diagonal text watermark to every page." },
  { id:"pageno", name:"Page numbers", desc:"Add page numbers." },
  { id:"compress", name:"Compress", desc:"Shrink by rasterising pages to JPEG (text becomes image)." },
  { id:"ocr", name:"OCR", accept:"application/pdf,image/*", desc:"Recognise text in a scanned PDF or image (runs in your browser)." },
  { id:"sign", name:"Sign", accept:"application/pdf", desc:"Draw or upload a signature, then click on the page to place it." },
];

let sel = TOOLS[0];
let files = [];              // [{name, bytes(ArrayBuffer)}]
let sigDataUrl = null;       // signature image (PNG data URL)
let sigPad = null;
let placement = null;        // {page, xPdf, yPdf}
let pageRender = null;       // {pageW, pageH, scale} for sign placement

const $ = id => document.getElementById(id);

// ---- sidebar ----
const side = $("side");
TOOLS.forEach(t => {
  const d = document.createElement("div");
  d.className = "tool"; d.textContent = t.name; d.dataset.id = t.id;
  d.onclick = () => pick(t, d);
  side.appendChild(d);
});

function pick(t, el) {
  teardownReader();
  sel = t; files = []; sigDataUrl = null; placement = null; pageRender = null; sigPad = null;
  document.querySelectorAll(".tool").forEach(x => x.classList.remove("sel"));
  el.classList.add("sel");
  $("title").textContent = t.name;
  $("desc").textContent = t.desc;
  $("dropNote").textContent = t.viewer ? "open several at once — each becomes a tab" : (t.multi ? "you can add several files" : (t.accept && t.accept.includes("image") ? "PDF or image" : ""));
  $("file").setAttribute("accept", t.accept || "application/pdf");
  $("file").multiple = !!(t.multi || t.viewer);
  $("files").innerHTML = ""; $("status").textContent = ""; $("result").innerHTML = "";
  $("drop").style.display = ""; $("drop").classList.add("full");
  $("run").style.display = t.viewer ? "none" : "";
  document.querySelector(".main").style.maxWidth = t.viewer ? "none" : "960px";
  renderControls();
  updateRun();
}

// ---- controls per tool ----
function field(html) { const d = document.createElement("div"); d.className = "f"; d.innerHTML = html; return d; }
function renderControls() {
  const c = $("controls"); c.innerHTML = "";
  const row = document.createElement("div"); row.className = "row";
  if (sel.id === "split") {
    row.appendChild(field(`<label>mode</label><select id="o_mode"><option value="range">extract page range</option><option value="each">split to single pages (.zip)</option></select>`));
    row.appendChild(field(`<label>pages (for range)</label><input type="text" id="o_pages" value="1-1" placeholder="e.g. 1,3-5">`));
  } else if (sel.id === "rotate") {
    row.appendChild(field(`<label>angle</label><select id="o_angle"><option>90</option><option>180</option><option>270</option></select>`));
    row.appendChild(field(`<label>pages (empty = all)</label><input type="text" id="o_pages" placeholder="e.g. 1,3-5">`));
  } else if (sel.id === "watermark") {
    row.appendChild(field(`<label>text</label><input type="text" id="o_text" value="DRAFT">`));
    row.appendChild(field(`<label>opacity</label><input type="number" id="o_opacity" value="0.3" step="0.05" min="0.05" max="1">`));
  } else if (sel.id === "pageno") {
    row.appendChild(field(`<label>position</label><select id="o_pos"><option>bottom-center</option><option>bottom-right</option><option>bottom-left</option><option>top-right</option></select>`));
    row.appendChild(field(`<label>start at</label><input type="number" id="o_start" value="1" min="1">`));
  } else if (sel.id === "compress") {
    row.appendChild(field(`<label>quality (1–100)</label><input type="number" id="o_quality" value="55" min="10" max="100">`));
    row.appendChild(field(`<label>dpi</label><input type="number" id="o_dpi" value="120" min="50" max="300">`));
  } else if (sel.id === "ocr") {
    row.appendChild(field(`<label>language</label><select id="o_lang"><option value="eng">English</option><option value="chi_sim">中文(简)</option><option value="chi_tra">中文(繁)</option><option value="eng+chi_sim">English + 中文</option></select>`));
  }
  if (row.children.length) c.appendChild(row);
  if (sel.id === "sign") c.appendChild(signPanel());
}

// ---- sign panel ----
function signPanel() {
  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="row">
      <div class="seg"><button id="sg_draw" class="on" type="button">Draw</button><button id="sg_up" type="button">Upload image</button></div>
    </div>
    <div id="sg_drawbox">
      <canvas class="sig" id="sg_canvas" width="380" height="130"></canvas>
      <div class="row"><button class="btn ghost" id="sg_clear" type="button">Clear</button><button class="btn ghost" id="sg_use" type="button">Use this signature</button></div>
    </div>
    <div id="sg_upbox" style="display:none">
      <input type="file" id="sg_img" accept="image/png,image/jpeg"><div class="note">PNG with transparent background works best.</div>
    </div>
    <div class="row">
      <div class="f"><label>page</label><input type="number" id="sg_page" value="1" min="1" style="width:80px"></div>
      <div class="f"><label>signature width (pt)</label><input type="number" id="sg_w" value="140" min="30" max="500" style="width:120px"></div>
      <button class="btn ghost" id="sg_load" type="button">Load page → click to place</button>
    </div>
    <div class="note" id="sg_state">Make a signature, load a page, then click where it should go.</div>
  `;
  setTimeout(initSign, 0);
  return wrap;
}
function initSign() {
  if (!$("sg_canvas") || !$("sg_draw")) return;   // panel was re-rendered away before timer fired
  const canvas = $("sg_canvas");
  const ratio = Math.max(1, window.devicePixelRatio || 1);   // sharp signature on hi-DPI (pad only)
  canvas.style.width = "380px"; canvas.style.height = "130px";
  canvas.width = 380 * ratio; canvas.height = 130 * ratio;
  canvas.getContext("2d").scale(ratio, ratio);
  if (window.SignaturePad) { sigPad = new SignaturePad(canvas, { penColor:"#16324f" }); }
  const seg = (a,b) => { $("sg_draw").classList.toggle("on", a); $("sg_up").classList.toggle("on", b);
    $("sg_drawbox").style.display = a ? "" : "none"; $("sg_upbox").style.display = b ? "" : "none"; };
  $("sg_draw").onclick = () => seg(true,false);
  $("sg_up").onclick = () => seg(false,true);
  $("sg_clear").onclick = () => sigPad && sigPad.clear();
  $("sg_use").onclick = () => {
    if (!sigPad || sigPad.isEmpty()) return setStatus("Draw a signature first.", true);
    sigDataUrl = sigPad.toDataURL("image/png"); setSign("Signature ready. Now load a page and click to place.");
  };
  $("sg_img").onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader(); r.onload = () => { sigDataUrl = r.result; setSign("Image ready. Now load a page and click to place."); };
    r.readAsDataURL(f);
  };
  $("sg_load").onclick = loadSignPage;
}
function setSign(msg) { const s = $("sg_state"); if (s) s.textContent = msg; }

async function loadSignPage() {
  if (!files.length) return setStatus("Add a PDF first.", true);
  const pdf = await pdfjsLib.getDocument({ data: files[0].bytes.slice(0) }).promise;
  const pageNo = Math.max(1, parseInt($("sg_page").value || "1", 10));
  if (pageNo > pdf.numPages) return setStatus(`Page ${pageNo} doesn't exist — document has ${pdf.numPages} page(s).`, true);
  setStatus("Rendering page " + pageNo + " …");
  const page = await pdf.getPage(pageNo);
  const scale = Math.min(1.4, 900 / page.getViewport({ scale:1 }).width);
  const vp = page.getViewport({ scale });
  const canvas = document.createElement("canvas");
  canvas.className = "page"; canvas.width = vp.width; canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
  pageRender = { scale, pageNo };
  placement = null;
  canvas.onclick = ev => {
    const r = canvas.getBoundingClientRect();
    const cx = (ev.clientX - r.left) * (canvas.width / r.width);
    const cy = (ev.clientY - r.top) * (canvas.height / r.height);
    const [xPdf, yPdf] = vp.convertToPdfPoint(cx, cy); // handles scale, page rotation, and Y-flip
    placement = { page: pageNo, xPdf, yPdf };
    setSign("Placed at (" + Math.round(xPdf) + ", " + Math.round(yPdf) + "). Click again to move, then press Run.");
    // redraw + marker
    page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise.then(() => {
      const g = canvas.getContext("2d"); g.fillStyle = "rgba(47,111,237,.85)";
      g.beginPath(); g.arc(cx, cy, 6, 0, 7); g.fill();
    });
    updateRun();
  };
  const res = $("result"); res.innerHTML = ""; res.appendChild(canvas);
  setStatus("Click on the page to place your signature.");
  updateRun();
}

// ---- file drop ----
const drop = $("drop"), fileInput = $("file");
let pendingPickTool = null;
function openPicker(){ pendingPickTool = sel; fileInput.click(); }   // remember which tool opened the dialog
drop.onclick = () => openPicker();
$("sideToggle").onclick = () => {
  document.querySelector(".wrap").classList.toggle("collapsed");
  if (viewer && viewer.fit) setTimeout(() => setViewerZoom(viewer.fit()), 70);
};
fileInput.onchange = e => {
  const picked = [...e.target.files];
  if (pendingPickTool && pendingPickTool !== sel) { pendingPickTool = null; fileInput.value = ""; return; }  // tool changed while dialog open — ignore stray pick
  pendingPickTool = null;
  addFiles(picked);
};
["dragover","dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => addFiles([...e.dataTransfer.files]));
// a file dropped anywhere else must not navigate the page away
window.addEventListener("dragover", e => e.preventDefault());
window.addEventListener("drop", e => e.preventDefault());
async function addFiles(fs) {
  if (sel.viewer) {
    const pdfs = fs.filter(f => f.type === "application/pdf" || /\.pdf$/i.test(f.name));
    if (!pdfs.length) { setStatus("Please choose a PDF file.", true); fileInput.value = ""; return; }
    $("drop").classList.remove("full"); $("drop").style.display = "none";
    openReader();
    for (const f of pdfs) await addDoc(f);
    fileInput.value = "";
    return;
  }
  if (!sel.multi) files = [];
  for (const f of fs) files.push({ name:f.name, bytes: await f.arrayBuffer() });
  $("files").innerHTML = files.map(f => `<span>${f.name} · ${(f.size||f.bytes.byteLength)/1024|0} KB</span>`).join("");
  $("drop").classList.remove("full");
  placement = null; pageRender = null;          // a new file invalidates any prior signature placement
  if (sel.id === "sign") { $("result").innerHTML = ""; setSign("New file loaded — click 'Load page', then click to place."); }
  updateRun();
}
function updateRun() {
  let ok = files.length > 0;
  if (sel.id === "merge") ok = files.length >= 2;
  if (sel.id === "sign") ok = files.length > 0 && sigDataUrl && placement;
  $("run").disabled = !ok;
}

// ---- run ----
$("run").onclick = run;
function setStatus(s, err) { const e = $("status"); e.textContent = s; e.className = "status" + (err ? " err" : ""); }
function showPdf(bytes, name) {
  const url = URL.createObjectURL(new Blob([bytes], { type:"application/pdf" }));
  $("result").innerHTML = `<a class="dl" download="${name}" href="${url}">⬇ Download ${name}</a><iframe src="${url}"></iframe>`;
}
function showBlob(blob, name, label) {

function showText(txt) {

  $("result").innerHTML = `<a class="dl" download="ocr.txt" href="${url}">⬇ Download text</a><pre>${txt.replace(/[<&]/g, c => c === "<" ? "&lt;" : "&amp;")}</pre>`;

function parsePages(spec, total) {
  const out = new Set();
  (spec || "").split(",").forEach(part => {
    part = part.trim(); if (!part) return;
    if (part.includes("-")) { let [a,b] = part.split("-"); a = parseInt(a||"1",10); b = b.trim() ? parseInt(b,10) : total;
      for (let i=a;i<=b;i++) if (i>=1 && i<=total) out.add(i-1); }
    else { const n = parseInt(part,10); if (n>=1 && n<=total) out.add(n-1); }
  });
  return [...out].sort((a,b)=>a-b);
}

const handlers = {
  async merge() {
    const out = await PDFDocument.create();
    for (const f of files) { const src = await PDFDocument.load(f.bytes);
      const pages = await out.copyPages(src, src.getPageIndices()); pages.forEach(p => out.addPage(p)); }
    showPdf(await out.save(), "merged.pdf");
  },
  async split() {
    const src = await PDFDocument.load(files[0].bytes);
    const total = src.getPageCount();
    if ($("o_mode").value === "each") {
      const zip = new JSZip();
      for (let i=0;i<total;i++) { const d = await PDFDocument.create(); const [p] = await d.copyPages(src,[i]); d.addPage(p);
        zip.file(`page_${String(i+1).padStart(3,"0")}.pdf`, await d.save()); }
      showBlob(await zip.generateAsync({ type:"blob" }), "pages.zip", "pages.zip");
    } else {
      const idx = parsePages($("o_pages").value, total);
      if (!idx.length) throw new Error("no pages selected");
      const d = await PDFDocument.create(); const ps = await d.copyPages(src, idx); ps.forEach(p=>d.addPage(p));
      showPdf(await d.save(), "extracted.pdf");
    }
  },
  async rotate() {
    const doc = await PDFDocument.load(files[0].bytes);
    const total = doc.getPageCount();
    const angle = parseInt($("o_angle").value,10);
    const sel2 = $("o_pages").value.trim() ? parsePages($("o_pages").value, total) : [...Array(total).keys()];
    sel2.forEach(i => { const p = doc.getPage(i); p.setRotation(degrees((p.getRotation().angle + angle) % 360)); });
    showPdf(await doc.save(), "rotated.pdf");
  },
  async watermark() {
    const doc = await PDFDocument.load(files[0].bytes);
    const font = await doc.embedFont(StandardFonts.HelveticaBold);
    const text = $("o_text").value || "DRAFT";
    const op = parseFloat($("o_opacity").value) || 0.3;
    const off = font.widthOfTextAtSize(text, 48) / 2 * 0.7071;   // center the 45° diagonal text
    doc.getPages().forEach(p => { const { width, height } = p.getSize();
      p.drawText(text, { x: width/2 - off, y: height/2 - off, size: 48, font,
        color: rgb(0.5,0.5,0.5), opacity: op, rotate: degrees(45) }); });
    showPdf(await doc.save(), "watermarked.pdf");
  },
  async pageno() {
    const doc = await PDFDocument.load(files[0].bytes);
    const font = await doc.embedFont(StandardFonts.Helvetica);
    const pos = $("o_pos").value; const start = parseInt($("o_start").value,10) || 1;
    const pages = doc.getPages();
    pages.forEach((p, i) => { const { width, height } = p.getSize();
      const label = `${start + i} / ${start + pages.length - 1}`;
      const tw = font.widthOfTextAtSize(label, 10);
      let x = width/2 - tw/2, y = 24;
      if (pos.includes("right")) x = width - tw - 36; if (pos.includes("left")) x = 36;
      if (pos.includes("top")) y = height - 30;
      p.drawText(label, { x, y, size: 10, font, color: rgb(0.2,0.2,0.2) }); });
    showPdf(await doc.save(), "numbered.pdf");
  },
  async compress() {
    const q = (parseInt($("o_quality").value,10) || 55) / 100;
    const dpi = parseInt($("o_dpi").value,10) || 120;
    const pdf = await pdfjsLib.getDocument({ data: files[0].bytes.slice(0) }).promise;
    const out = await PDFDocument.create();
    for (let i=1;i<=pdf.numPages;i++) {
      setStatus(`Compressing page ${i}/${pdf.numPages} …`);
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: dpi/72 });
      const c = document.createElement("canvas"); c.width = vp.width; c.height = vp.height;
      await page.render({ canvasContext: c.getContext("2d"), viewport: vp }).promise;
      const jpg = await out.embedJpg(c.toDataURL("image/jpeg", q));
      const base = page.getViewport({ scale:1 });
      const pg = out.addPage([base.width, base.height]);
      pg.drawImage(jpg, { x:0, y:0, width: base.width, height: base.height });
    }
    showPdf(await out.save(), "compressed.pdf");
  },
  async ocr() {
    const lang = $("o_lang").value;
    setStatus("Loading OCR model (first run downloads ~10MB) …");
    const worker = await Tesseract.createWorker(lang, 1, { logger: m => {
      if (m.status === "recognizing text") setStatus(`OCR: ${Math.round(m.progress*100)}%`); } });
    try {
      let images = [];
      const f = files[0];
      const isImg = /\.(png|jpe?g|bmp|tiff?|webp)$/i.test(f.name);
      if (isImg) { images = [new Blob([f.bytes])]; }
      else {
        const pdf = await pdfjsLib.getDocument({ data: f.bytes.slice(0) }).promise;
        for (let i=1;i<=pdf.numPages;i++) { const page = await pdf.getPage(i);
          const vp = page.getViewport({ scale: 200/72 });
          const c = document.createElement("canvas"); c.width = vp.width; c.height = vp.height;
          await page.render({ canvasContext: c.getContext("2d"), viewport: vp }).promise; images.push(c); }
      }
      let text = "";
      for (let i=0;i<images.length;i++) { setStatus(`OCR page ${i+1}/${images.length} …`);
        const { data } = await worker.recognize(images[i]); text += (data.text || "") + "\n\n"; }
      showText(text.trim() || "(no text recognised)");
    } finally { await worker.terminate(); }   // always release the WASM worker, even on error
  },
  async sign() {
    const doc = await PDFDocument.load(files[0].bytes);
    const img = /^data:image\/png/i.test(sigDataUrl)
      ? await doc.embedPng(sigDataUrl) : await doc.embedJpg(sigDataUrl);   // upload may be JPEG
    const w = parseInt($("sg_w").value,10) || 140;
    const h = w * (img.height / img.width);
    const p = doc.getPage(Math.min(placement.page, doc.getPageCount()) - 1);
    const { width, height } = p.getSize();
    const x = Math.max(0, Math.min(placement.xPdf - w/2, width - w));   // center on click, clamp to page
    const y = Math.max(0, Math.min(placement.yPdf - h/2, height - h));
    p.drawImage(img, { x, y, width: w, height: h });
    showPdf(await doc.save(), "signed.pdf");
    placement = null; pageRender = null;   // require re-loading/placing before signing again
  },
};

}
async function addDoc(file) {
  setStatus("Opening " + (file.name||"PDF") + " …");
  const bytes = await file.arrayBuffer();
  let pdf;
  try { pdf = await pdfjsLib.getDocument({ data: bytes.slice(0) }).promise; }
  catch (e) { setStatus("Couldn't open " + (file.name||"PDF") + ": " + (e.message || e), true); return; }
  const num = pdf.numPages;
  const sizes = [];
  for (let i=1;i<=num;i++){ const p=await pdf.getPage(i); const vp=p.getViewport({scale:1}); sizes.push({w:vp.width,h:vp.height}); }
  const scroll = document.createElement("div"); scroll.className = "vscroll"; scroll.style.display = "none";
  $("v_stack").appendChild(scroll);
  const maxW = Math.max(...sizes.map(s=>s.w));
  const doc = { name:file.name||"document.pdf", bytes, pdf, num, sizes, maxW, scale:0.5, scroll, pages:[], io:null, current:1, gen:0,
                tc:{}, pageText:{}, findTimer:null, find:{ query:"", matches:[], current:-1, ranges:new Map(), open:false }, onScroll:null, dlUrl:null };
  doc.fit = () => Math.max(0.2, Math.min(3, (scroll.clientWidth - 32) / maxW));
  docs.push(doc);
  renderTabs();
  activateDoc(doc);                 // make its scroll visible so clientWidth is valid
  doc.scale = doc.fit();
  buildDocPages(doc);
  doc.io = new IntersectionObserver(es => { for (const en of es) if (en.isIntersecting) renderViewerPage(+en.target.dataset.i); }, { root: scroll, rootMargin: "400px 0px" });
  doc.pages.forEach(pg => doc.io.observe(pg));
  doc.onScroll = () => { if (viewer !== doc) return; const y = scroll.scrollTop + scroll.clientHeight*0.3; let cur=1;
    for (let i=0;i<doc.pages.length;i++){ if (doc.pages[i].offsetTop <= y) cur=i+1; else break; }
    if (cur!==doc.current){ doc.current=cur; const inp=$("v_page"); if (inp && document.activeElement!==inp) inp.value=cur; } };
  scroll.addEventListener("scroll", doc.onScroll, { passive:true });
  $("v_total").textContent = num; $("v_page").value = 1; updateViewerZoom();
  renderVisibleViewer();
  setStatus(`Reading ${doc.name} — ${num} page(s). Ctrl+F find · ←/→ pages · +/− zoom · select text to copy.`);
}
function buildDocPages(doc){
  doc.scroll.innerHTML = ""; doc.pages = [];
  for (let i=1;i<=doc.num;i++){ const s=doc.sizes[i-1];
    const pg=document.createElement("div"); pg.className="vpage"; pg.dataset.i=i; pg.dataset.rendered="0";
    pg.style.width=Math.round(s.w*doc.scale)+"px"; pg.style.height=Math.round(s.h*doc.scale)+"px";
    doc.scroll.appendChild(pg); doc.pages.push(pg); }
}
function activateDoc(doc){

  renderTabs();

  if (!doc.dlUrl) doc.dlUrl = URL.createObjectURL(new Blob([doc.bytes], { type:"application/pdf" }));

function closeDoc(doc){

}
async function renderViewerPage(i){
  const pg = viewer && viewer.pages[i-1]; if (!pg) return;
  const want = String(viewer.scale);
  if (pg.dataset.rendered === want) return;
  const gen = viewer.gen;
  pg.dataset.rendered = want;
  let page;
  try { page = await viewer.pdf.getPage(i); } catch(e){ pg.dataset.rendered="0"; return; }
  if (!viewer || viewer.gen !== gen) { pg.dataset.rendered="0"; return; }   // superseded → retryable
  const renderScale = viewer.scale;
  const ratio = Math.max(1, window.devicePixelRatio || 1);
  const vp = page.getViewport({ scale: renderScale });
  const canvas = document.createElement("canvas");
  canvas.width = Math.floor(vp.width*ratio); canvas.height = Math.floor(vp.height*ratio);
  canvas.style.width = Math.floor(vp.width)+"px"; canvas.style.height = Math.floor(vp.height)+"px";
  const ctx = canvas.getContext("2d"); ctx.scale(ratio, ratio);
  try { await page.render({ canvasContext: ctx, viewport: vp }).promise; }
  catch(e){ pg.dataset.rendered="0"; return; }
  if (!viewer || viewer.gen !== gen) { pg.dataset.rendered="0"; return; }   // superseded → retryable
  pg.innerHTML = ""; pg.appendChild(canvas);
  try {
    const tc = await getPageTC(i);
    if (!viewer || viewer.gen !== gen) return;
    const tl = document.createElement("div"); tl.className="textLayer";
    tl.style.width=Math.floor(vp.width)+"px"; tl.style.height=Math.floor(vp.height)+"px";
    tl.style.setProperty("--scale-factor", renderScale);
    pg.appendChild(tl);
    await pdfjsLib.renderTextLayer({ textContent: tc, container: tl, viewport: vp, textDivs: [] }).promise;
    if (viewer && viewer.find && viewer.find.open && viewer.find.query.trim()) { computePageRanges(i); refreshFindHighlights(); }
  } catch(e){ /* text layer is optional */ }
}
function gotoViewerPage(n){
  if (!viewer) return;

function renderVisibleViewer(){

  if (HL_OK) { CSS.highlights.delete("pdffind"); CSS.highlights.delete("pdffindcur"); }
  if (viewer && viewer.find) viewer.find.ranges = new Map();
}
async function runFind(query){
  if (!viewer) return;
  viewer.find.query = query; viewer.find.matches = []; viewer.find.current = -1;
  clearFindHighlights();
  const q = (query || "").trim().toLowerCase();
  if (!q) { updateFindCount(); return; }
  const matches = [];
  for (let i=1;i<=viewer.num;i++){
    const text = (await getPageText(i)).toLowerCase();
    let from=0, idx;
    while ((idx = text.indexOf(q, from)) !== -1){ matches.push({ page:i }); from = idx + q.length; }
    if (!viewer || viewer.find.query !== query) return;   // a newer query superseded this run
  }
  viewer.find.matches = matches;
  updateFindCount();
  if (matches.length) await gotoFindMatch(0);
}
function occWithinPage(m){
  const matches = viewer.find.matches; const page = matches[m].page; let occ=0;
  for (let k=0;k<m;k++) if (matches[k].page === page) occ++;
  return occ;
}
async function gotoFindMatch(m){
  const matches = viewer.find.matches; if (!matches.length) return;
  m = (m % matches.length + matches.length) % matches.length;
  viewer.find.current = m;
  const page = matches[m].page, occ = occWithinPage(m);
  gotoViewerPage(page);
  await renderViewerPage(page);
  if (!viewer.find.ranges.get(page)) computePageRanges(page);
  refreshFindHighlights();
  const arr = viewer.find.ranges.get(page);
  const cur = arr && arr[occ];
  if (cur && cur.startContainer && cur.startContainer.parentElement) cur.startContainer.parentElement.scrollIntoView({ block:"center" });
  updateFindCount();
}
function computePageRanges(page){
  if (!HL_OK || !viewer) return;
  const pg = viewer.pages[page-1]; const tl = pg && pg.querySelector(".textLayer"); if (!tl) return;
  const q = (viewer.find.query || "").trim().toLowerCase();
  if (!q) { viewer.find.ranges.delete(page); return; }
  const walker = document.createTreeWalker(tl, NodeFilter.SHOW_TEXT);
  let node, full=""; const map=[];
  while ((node = walker.nextNode())) { map.push({ node, start: full.length }); full += node.nodeValue; }
  const lower = full.toLowerCase();
  const ranges=[]; let from=0, idx;
  while ((idx = lower.indexOf(q, from)) !== -1){
    const a = locateNode(map, idx), b = locateNode(map, idx + q.length);
    if (a && b) { try { const r = document.createRange(); r.setStart(a.node, a.offset); r.setEnd(b.node, b.offset); ranges.push(r); } catch(e){} }
    from = idx + q.length;
  }
  viewer.find.ranges.set(page, ranges);
}
function locateNode(map, pos){
  for (let k=map.length-1;k>=0;k--){ if (pos >= map[k].start) return { node: map[k].node, offset: pos - map[k].start }; }
  return map.length ? { node: map[0].node, offset: 0 } : null;
}
function refreshFindHighlights(){
  if (!HL_OK || !viewer) return;
  const all=[]; viewer.find.ranges.forEach(arr => arr.forEach(r => all.push(r)));
  if (all.length) CSS.highlights.set("pdffind", new Highlight(...all)); else CSS.highlights.delete("pdffind");
  const m = viewer.find.current, matches = viewer.find.matches;
  if (m>=0 && matches[m]){
    const page = matches[m].page, occ = occWithinPage(m);
    const arr = viewer.find.ranges.get(page), cur = arr && arr[occ];
    if (cur) CSS.highlights.set("pdffindcur", new Highlight(cur)); else CSS.highlights.delete("pdffindcur");
  } else CSS.highlights.delete("pdffindcur");
}
function updateFindCount(){
  const c = $("findcnt"); if (!c) return;
  const n = viewer.find.matches.length, cur = viewer.find.current;
  c.textContent = n ? ((cur+1) + "/" + n) : "0/0";
}

// ---- PWA: deep links, OS file handling, service worker ----
function selectToolById(id) {
  const t = TOOLS.find(x => x.id === id);
  const el = side.querySelector('.tool[data-id="' + id + '"]');
  if (!t || !el) return false;
  pick(t, el);
  return true;
}

// init — honour ?tool= deep links (manifest shortcuts), else default to View/Read
const wantTool = new URLSearchParams(location.search).get("tool");
if (!(wantTool && selectToolById(wantTool))) pick(TOOLS[0], side.firstChild);

// Files the OS hands us — fires when a .pdf associated with the installed app is
// double-clicked, or opened via "Open with → online-pdf". The consumer is set
// unconditionally; launchQueue buffers the launch until a consumer exists.
// On the FIRST OS-launched open, Edge/Chrome show a one-time permission prompt
// ("Open" / "Allow") before getFile() resolves; subsequent opens are silent.
if ("launchQueue" in window && "setConsumer" in window.launchQueue) {
  window.launchQueue.setConsumer(async (params) => {
    if (!params || !params.files || !params.files.length) return;
    if (!selectToolById("view")) pick(TOOLS[0], side.firstChild);   // route into the reader
    const opened = [];
    for (const handle of params.files) {
      try { opened.push(await handle.getFile()); } catch (e) { /* skip unreadable */ }
    }
    if (opened.length) await addFiles(opened);
    else setStatus("Couldn't open the file(s) handed over by Windows.", true);
  });
}

// Service worker → installability + offline. Skipped on file:// (no SW there).
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => { /* non-fatal */ });
  });
}
</script>
